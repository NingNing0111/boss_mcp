name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            bin_ext: ""
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_ext: ""
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_ext: .exe
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Prepare package metadata
        id: prep
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BIN_NAME="boss_mcp${{ matrix.bin_ext }}"
          ASSET_NAME="boss_mcp-${VERSION}-${{ matrix.target }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "bin_name=${BIN_NAME}" >> "$GITHUB_OUTPUT"
          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ steps.prep.outputs.bin_name }}" "dist/${{ steps.prep.outputs.bin_name }}"
          tar -C dist -czf "${{ steps.prep.outputs.asset_name }}.${{ matrix.archive_ext }}" "${{ steps.prep.outputs.bin_name }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ steps.prep.outputs.bin_name }}" "dist/${{ steps.prep.outputs.bin_name }}"
          Compress-Archive -Path "dist/${{ steps.prep.outputs.bin_name }}" -DestinationPath "${{ steps.prep.outputs.asset_name }}.${{ matrix.archive_ext }}" -Force

      - name: Generate SHA256 (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          shasum -a 256 "${{ steps.prep.outputs.asset_name }}.${{ matrix.archive_ext }}" > "${{ steps.prep.outputs.asset_name }}.${{ matrix.archive_ext }}.sha256"

      - name: Generate SHA256 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ steps.prep.outputs.asset_name }}.${{ matrix.archive_ext }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ steps.prep.outputs.asset_name }}.${{ matrix.archive_ext }}" | Out-File -FilePath "${{ steps.prep.outputs.asset_name }}.${{ matrix.archive_ext }}.sha256" -Encoding ascii

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            ${{ steps.prep.outputs.asset_name }}.${{ matrix.archive_ext }}
            ${{ steps.prep.outputs.asset_name }}.${{ matrix.archive_ext }}.sha256
