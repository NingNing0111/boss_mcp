services:
  boss_mcp:
    platform: linux/arm64
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: boss_mcp
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data/session:/data/session
      - ./data/qr:/data/qr
    environment:
      - TZ=Asia/Shanghai
