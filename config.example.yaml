# Boss MCP 配置文件
#
# 复制此文件为 config.yaml 或直接在项目根目录创建 config.yaml
# 配置文件采用 YAML 格式

# 浏览器可执行文件路径（可选）
#   - 空值或留空：自动选择系统默认浏览器（需要已安装 Chrome/Edge/Chromium）
#   - 指定路径：使用指定浏览器的可执行文件
#   - 示例（Windows）: "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"
#   - 示例（Linux）: "/usr/bin/google-chrome"
browser_exe_path: ""

# 用户数据目录（必填）
#   - 用于存储登录会话、Cookie、缓存等浏览器数据
#   - 建议使用绝对路径
#   - 首次运行时会自动创建
#   - 示例（Windows）: "D:\\Code\\GithubProject\\boss_mcp\\data\\session"
#   - 示例（Linux/Mac）: "/home/user/boss_mcp/data/session"
user_data_dir: "default"

# 二维码输出路径（可选）
#   - 登录时生成的二维码图片保存位置
#   - 支持绝对路径和相对路径
#   - 默认为项目根目录下的 qr_code.png
#   - 示例: "D:\\Code\\GithubProject\\boss_mcp\\data\\session\\qr_code.png"
qr_output_path: "qr_code.png"

# ===============================================
# MCP 服务端配置
# ===============================================
mcp:
  # 传输类型
  #   - stdio: 标准输入输出模式，适合本地 CLI 工具集成
  #   - streamable_http: HTTP 流式传输模式，适合网络远程调用
  #   注意：当前版本 stdio 模式尚未实现，默认使用 streamable_http
  transport: streamable_http

  # HTTP 监听地址（仅 streamable_http 模式生效）
  #   - 默认: "127.0.0.1"
  #   - 改为 "0.0.0.0" 可接受外部连接（注意安全风险）
  http_host: "127.0.0.1"

  # HTTP 监听端口（仅 streamable_http 模式生效）
  #   - 默认: 8080
  #   - 可根据需要修改为其他端口
  http_port: 8080